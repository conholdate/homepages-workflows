name: Homepages Agent Heartbeat

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      agent_ref:
        description: Branch, tag, or SHA in conholdate/homepages-agent
        required: false
        default: main
      homepages_ref:
        description: Branch, tag, or SHA in conholdate/homepages
        required: false
        default: codex/aspose-metrics-adaptive-v1-20260628

permissions:
  contents: read

concurrency:
  group: homepages-agent-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      HOMEPAGES_AGENT_MANAGED_SCOPE: aspose
      HOMEPAGES_AGENT_TARGET_REPO: ${{ github.workspace }}/homepages
      GITHUB_HOMEPAGES_REPOS_PAT: ${{ secrets.AGENT_REPO_PAT }}
      HOMEPAGES_AGENT_HUGO_BIN: /usr/local/bin/hugo

    steps:
      - name: Checkout homepages-agent
        uses: actions/checkout@v4
        with:
          repository: conholdate/homepages-agent
          ref: ${{ github.event.inputs.agent_ref || 'main' }}
          token: ${{ secrets.AGENT_REPO_PAT }}
          path: homepages-agent
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout homepages source
        uses: actions/checkout@v4
        with:
          repository: conholdate/homepages
          ref: ${{ github.event.inputs.homepages_ref || 'codex/aspose-metrics-adaptive-v1-20260628' }}
          token: ${{ secrets.HOMEPAGES_SOURCE_PAT }}
          path: homepages
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Hugo
        env:
          HUGO_VERSION: 0.162.0
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_withdeploy_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Install Homepages Agent
        working-directory: homepages-agent
        run: python -m pip install -e . playwright

      - name: Install Playwright Chromium
        working-directory: homepages-agent
        run: python -m playwright install --with-deps chromium

      - name: Coordination check
        working-directory: homepages-agent
        run: python -m homepages_agent coordination-check --write --allow-discard-local-changes

      - name: Validation bundle
        working-directory: homepages-agent
        run: python -m homepages_agent validation-bundle --site all --environment stage --require-variant claude-inspired-v1 --timeout 240 --write

      - name: Pilot readiness
        working-directory: homepages-agent
        if: ${{ always() }}
        run: python -m homepages_agent pilot-readiness --site all --write

      - name: Write heartbeat summary
        working-directory: homepages-agent
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/heartbeat
          {
            echo "# Homepages Agent Heartbeat"
            echo
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Agent ref: ${{ github.event.inputs.agent_ref || 'main' }}"
            echo "- Homepages ref: ${{ github.event.inputs.homepages_ref || 'codex/aspose-metrics-adaptive-v1-20260628' }}"
            echo "- Created UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > reports/heartbeat/latest-heartbeat.md

      - name: Upload heartbeat reports
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: homepages-agent-heartbeat-reports
          path: |
            homepages-agent/reports/latest-coordination-check.*
            homepages-agent/reports/latest-validation-bundle.*
            homepages-agent/reports/latest-pilot-readiness.*
            homepages-agent/reports/heartbeat/latest-heartbeat.md
